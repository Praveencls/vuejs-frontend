trigger: none

pool:
  vmImage: 'windows-latest'

variables:
  organization: 'https://dev.azure.com/praveencls'
  project: 'AIEcommerce'
  iterationPath: 'AIEcommerce\Sprint 1'
  areaPath: 'AIEcommerce'

stages:
  - stage: SetupSprint
    displayName: 'Setup Ecommerce Sprint'
    jobs:
      - job: CreateWorkItems
        displayName: 'Create Scrum Work Items'
        steps:
          - checkout: self
            persistCredentials: true

          - task: PowerShell@2
            displayName: 'Create Epic, PBIs and Tasks'
            inputs:
              targetType: 'inline'
              script: |

                $org = "$(organization)"
                $project = "$(project)"

                $area = "AIEcommerce"
                $iteration = "AIEcommerce\Sprint 1"

                $pat = "$(System.AccessToken)"
                $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))

                $headers = @{
                    Authorization = "Basic $base64AuthInfo"
                    "Content-Type" = "application/json-patch+json"
                }

                function Create-WorkItem {
                    param (
                        [string]$type,
                        [string]$title,
                        [string]$description,
                        [int]$storyPoints
                    )

                    $body = @()

                    $body += @{
                        op = "add"
                        path = "/fields/System.Title"
                        value = $title
                    }

                    $body += @{
                        op = "add"
                        path = "/fields/System.AreaPath"
                        value = $area
                    }

                    $body += @{
                        op = "add"
                        path = "/fields/System.IterationPath"
                        value = $iteration
                    }

                    if ($description) {
                        $body += @{
                            op = "add"
                            path = "/fields/System.Description"
                            value = $description
                        }
                    }

                    if ($storyPoints -gt 0) {
                        $body += @{
                            op = "add"
                            path = "/fields/Microsoft.VSTS.Scheduling.StoryPoints"
                            value = $storyPoints
                        }
                    }

                    $json = $body | ConvertTo-Json -Depth 100

                    # ✅ FIXED URL CONSTRUCTION
                    $workItemType = [System.Uri]::EscapeDataString('$' + $type)
                    $url = "$org/$project/_apis/wit/workitems/$workItemType?api-version=7.0"

                    Write-Host "Creating Work Item Type: $type"
                    Write-Host "URL: $url"

                    $response = Invoke-RestMethod `
                        -Uri $url `
                        -Method Patch `
                        -Headers $headers `
                        -Body $json

                    return $response.id
                }

                Write-Host "Creating Epic..."
                $epicId = Create-WorkItem -type "Epic" -title "E-Commerce Checkout" -description "Checkout Implementation" -storyPoints 0

                Write-Host "Creating Product Backlog Item..."
                $pbiId = Create-WorkItem -type "Product Backlog Item" -title "Build Checkout UI" -description "Frontend checkout work" -storyPoints 8

                Write-Host "Creating Task..."
                Create-WorkItem -type "Task" -title "Create Address Component" -description "Vue component" -storyPoints 0
