trigger: none

pool:
  vmImage: 'windows-latest'

variables:
  organization: 'https://dev.azure.com/praveencls'
  project: 'AIEcommerce'
  areaPath: 'AIEcommerce'
  iterationPath: 'AIEcommerce\Sprint 1'

stages:
  - stage: SetupSprint
    displayName: 'Setup Ecommerce Sprint'
    jobs:
      - job: CreateWorkItems
        displayName: 'Create Scrum Work Items'
        steps:
          - checkout: self
            persistCredentials: true

          - task: PowerShell@2
            displayName: 'Create Epic, PBI and Task with Linking'
            inputs:
              targetType: 'inline'
              script: |

                $org = "$(organization)"
                $project = "$(project)"
                $area = "$(areaPath)"
                $iteration = "$(iterationPath)"

                $pat = "$(System.AccessToken)"
                $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))

                $headers = @{
                    Authorization = "Basic $base64AuthInfo"
                    "Content-Type" = "application/json-patch+json"
                }

                function Create-WorkItem {
                    param (
                        [string]$type,
                        [string]$title,
                        [string]$description,
                        [int]$storyPoints,
                        [int]$parentId
                    )

                    $body = @()

                    $body += @{
                        op = "add"
                        path = "/fields/System.Title"
                        value = $title
                    }

                    $body += @{
                        op = "add"
                        path = "/fields/System.AreaPath"
                        value = $area
                    }

                    $body += @{
                        op = "add"
                        path = "/fields/System.IterationPath"
                        value = $iteration
                    }

                    if ($description) {
                        $body += @{
                            op = "add"
                            path = "/fields/System.Description"
                            value = $description
                        }
                    }

                    if ($storyPoints -gt 0) {
                        $body += @{
                            op = "add"
                            path = "/fields/Microsoft.VSTS.Scheduling.StoryPoints"
                            value = $storyPoints
                        }
                    }

                    # Add Parent link if provided
                    if ($parentId -gt 0) {
                        $body += @{
                            op = "add"
                            path = "/relations/-"
                            value = @{
                                rel = "System.LinkTypes.Hierarchy-Reverse"
                                url = "$org/$project/_apis/wit/workItems/$parentId"
                            }
                        }
                    }

                    $json = $body | ConvertTo-Json -Depth 10

                    $workItemType = '$' + $type
                    $url = "$org/$project/_apis/wit/workitems/$workItemType?api-version=7.0"

                    Write-Host "Creating $type : $title"
                    Write-Host "URL: $url"

                    $response = Invoke-RestMethod `
                        -Uri $url `
                        -Method Patch `
                        -Headers $headers `
                        -Body $json

                    return $response.id
                }

                Write-Host "Creating Epic..."
                $epicId = Create-WorkItem `
                    -type "Epic" `
                    -title "E-Commerce Checkout" `
                    -description "Checkout Implementation" `
                    -storyPoints 0 `
                    -parentId 0

                Write-Host "Epic Created: $epicId"

                Write-Host "Creating Product Backlog Item..."
                $pbiId = Create-WorkItem `
                    -type "Product Backlog Item" `
                    -title "Build Checkout UI" `
                    -description "Frontend checkout implementation" `
                    -storyPoints 8 `
                    -parentId $epicId

                Write-Host "PBI Created: $pbiId"

                Write-Host "Creating Task..."
                $taskId = Create-WorkItem `
                    -type "Task" `
                    -title "Create Address Component" `
                    -description "Vue 3 Address Component" `
                    -storyPoints 0 `
                    -parentId $pbiId

                Write-Host "Task Created: $taskId"

                Write-Host "All Work Items Created Successfully!"
