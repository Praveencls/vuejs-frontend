trigger:
  - master

pool:
  vmImage: ubuntu-latest

variables:
  - group: AIcommerce_group # Must contain AZURE_STATIC_WEB_APPS_API_TOKEN
  # 🔴 Make sure this variable exists in the variable group
  # 🔴 Value should be your API Gateway URL
  - name: VITE_API_BASE_URL
    value: $(VITE_API_BASE_URL)

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: 'Use Node 22'

  - script: npm ci
    displayName: 'Install Dependencies'

  - script: npm run build
    displayName: 'Build App'
    env:
      # 🔴 This injects the Gateway URL into Vue build
      VITE_API_BASE_URL: $(VITE_API_BASE_URL)

  - script: |
      echo "Listing dist folder..."
      ls -la dist
    displayName: 'Debug dist'

  - task: AzureStaticWebApp@0
    displayName: 'Deploy to Azure Static Web App'
    inputs:
      app_location: 'dist'
      output_location: ''
      skip_app_build: true
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
